name: Build
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ github.workspace }}/unity.ulf
        with:
          targetPlatform: Android
          unityVersion: 2022.3.0f1
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: build/Android
