name: Final Supermarket Build 🛒

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Project 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read License File
        id: read_license
        # هنا بنقرأ محتوى الملف اللي أنت رفعته ونخزنه في الذاكرة المؤقتة للـ Build
        run: |
          echo "UNITY_LICENSE<<EOF" >> $GITHUB_ENV
          cat unity.ulf >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          # هنا بنستخدم الرخصة اللي قرأناها من الملف فوق
          UNITY_LICENSE: ${{ env.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.0f1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Supermarket-Build
          path: build/Android
