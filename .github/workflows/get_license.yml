name: Get License File
on: workflow_dispatch
jobs:
  get_alf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: game-ci/unity-request-activation-file@v2
      - uses: actions/upload-artifact@v4
        with:
          name: Unity_v2022.alf
          path: ./*.alf
          
