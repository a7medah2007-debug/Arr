name: Get License File
on: workflow_dispatch
jobs:
  get_alf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Request activation file
        uses: game-ci/unity-request-activation-file@v2.3.2 # جرب هذا الإصدار المحدد
        with:
          unityVersion: 2022.3.0f1 # اكتب هنا نفس نسخة يونيتي اللي شغال بيها مشروعك
      - uses: actions/upload-artifact@v4
        with:
          name: Unity_License_Request
          path: ./*.alf
