name: Build My Supermarket APK 🛒

on:
  workflow_dispatch:

jobs:
  check_secret:
    name: Check Secret Presence 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Is Secret Empty?
        run: |
          if [ -z "${{ secrets.UNITY_LICENSE }}" ]; then
            echo "❌ ERROR: UNITY_LICENSE is EMPTY! Fix it in Settings -> Secrets."
            exit 1
          else
            echo "✅ SUCCESS: UNITY_LICENSE is found and has content."
          fi

  build:
    needs: check_secret
    name: Build Project 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: Android
          unityVersion: 2022.3.0f1
